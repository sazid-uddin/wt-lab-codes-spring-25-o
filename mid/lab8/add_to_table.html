<!DOCTYPE html>
<html lang="en">
<head>
	<title>Document</title>
</head>
<body>
	<style>
		table, th, td {
			border: 1px solid black;
			border-collapse: collapse;
		}

		th,td {
			padding: 10px;
		}
	</style>
	<table>
		<tr>
			<th>Name</th>
			<th>Age</th>
		</tr>
		<tr>
			<td>Alice</td>
			<td>20</td>
		</tr>
		<tr>
			<td>Bob</td>
			<td>25</td>
		</tr>
	</table>
	<br>
	<!-- <table>
		<tr>
			<td>2nd table</td>
		</tr>
	</table> -->
	<br>
	<button onclick="addRow()">Add row to table</button>

	<script>
		// Goal: Add a new row to the table with table data
		function addRow() {
			// Step 1: load the table in JS - done
			var tables = document.getElementsByTagName("table"); // always return an array of element. return all tables in an array
			var table = tables[0];

			// document.getElementById() // always returns single element
			// console.log(tables);

			// Step 2: create a new row
			var newRow = document.createElement("tr");
			// <tr></tr>

			// Step 2.1: create first table data in new row
			var td1 = document.createElement("td");
			// <td></td>
			td1.innerHTML = "John";
			// <td>John</td>

			newRow.appendChild(td1);
			// <tr>
			//	<td>John</td>
			// </tr>

			// Step 2.2: create 2nd table data in new row
			var td2 = document.createElement("td");
			// <td></td>
			td2.innerHTML = "20";
			// <td>20</td>

			newRow.appendChild(td2);
			// <tr>
			//	<td>John</td>
			//  <td>20</td>
			// </tr>

			// Step 3: add new row to the table
			table.appendChild(newRow);
		}
	</script>
</body>
</html>
