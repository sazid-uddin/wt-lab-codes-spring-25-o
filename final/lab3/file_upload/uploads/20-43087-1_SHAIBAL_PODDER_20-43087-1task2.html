    <title>Floating Contact Widget</title>
    <style>
        .contact-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: yellow;
            padding: 20px;
            border: 2px solid #333;
            text-align: center;
            border-radius: 8px;
        }

        .contact-widget a {
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }

        .contact-widget:hover {
            background-color: greenyellow;
        }
    </style>
</head>
